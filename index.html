<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMUNAH - Igreja</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* FUNDO PREMIUM */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,215,0,0.07) 1px, transparent 1px);
  background-size:35px 35px;
  animation:moveBg 30s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  from{transform:translate(0,0);}
  to{transform:translate(-300px,-300px);}
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeOut 1.2s ease 3s forwards;
}

#intro img{
  width:240px;
  border-radius:25px;
  box-shadow:0 0 60px rgba(255,215,0,0.8);
  animation:zoom 2s ease-in-out infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

@keyframes fadeOut{
  to{opacity:0; visibility:hidden;}
}

#site{
  padding:70px 18px;
  max-width:500px;
  margin:auto;
}

.logo{
  width:170px;
  margin-bottom:25px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(255,215,0,0.3);
}

h1{
  color:gold;
  font-size:26px;
  margin-bottom:30px;
  letter-spacing:3px;
}

/* CARD */
.card{
  position:relative;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);
  padding:22px;
  margin:18px 0;
  border-radius:22px;
  box-shadow:0 15px 45px rgba(0,0,0,0.6);
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 20px 60px rgba(255,215,0,0.25);
}

/* CARD COM NOVIDADE */
.card.novo{
  border:1px solid rgba(255,215,0,0.6);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 15px rgba(255,215,0,0.4);}
  to{box-shadow:0 0 30px rgba(255,215,0,0.9);}
}

/* SELO NOVIDADE */
.badge{
  position:absolute;
  top:-10px;
  right:-10px;
  background:linear-gradient(45deg,#FFD700,#ffae00);
  color:black;
  padding:6px 12px;
  font-size:12px;
  font-weight:700;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(255,215,0,0.6);
  animation:pulseBadge 1.5s infinite;
}

@keyframes pulseBadge{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* IMAGEM */
.card img{
  width:100%;
  border-radius:18px;
  margin-top:15px;
  display:none;
  opacity:0;
  transform:scale(0.95);
  transition:0.5s ease;
  box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.card img.show{
  display:block;
  opacity:1;
  transform:scale(1);
}

/* BOTÃO */
.btn{
  display:inline-block;
  margin-top:45px;
  padding:18px 35px;
  background:linear-gradient(45deg,#25D366,#1ebe5d);
  color:white;
  text-decoration:none;
  border-radius:50px;
  font-weight:600;
  letter-spacing:1px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 15px rgba(37,211,102,0.4);}
  50%{box-shadow:0 0 30px rgba(37,211,102,0.9);}
  100%{box-shadow:0 0 15px rgba(37,211,102,0.4);}
}

</style>
</head>

<body>

<div id="intro">
  <img src="IMG-20260319-WA0002.jpg">
</div>

<div id="site">

  <img src="IMG-20260319-WA0002.jpg" class="logo">
  <h1>IGREJA EMUNAH</h1>

  <div class="card">Terça - Minha família no altar (20:00 Horas - BR)</div>
  <div class="card">Quarta - Oração e ensaio (20:00 Horas - BR)</div>

  <!-- QUINTA -->
  <div class="card novo" onclick="toggleCard(this)">
    <div class="badge">NOVIDADE</div>
    Quinta - Culto de libertação (20:00 Horas - BR)
    <img src="f05036ad02e941c8ac8a829997e7d606.jpg">
  </div>

  <!-- SÁBADO -->
  <div class="card novo" onclick="toggleCard(this)">
    <div class="badge">NOVIDADE</div>
    Sábado - Culto a cada 15 dias (16:00 Horas - BR)
    <img src="IMG-20260422-WA0005.jpg">
  </div>

  <!-- DOMINGO -->
  <div class="card novo" onclick="toggleCard(this)">
    <div class="badge">NOVIDADE</div>
    Domingo - Culto (19:00 Horas - BR)
    <img src="b8bd9795c5654bd89aac7f42482ab926.jpg">
  </div>

  <a class="btn"
  href="https://wa.me/556496078723?text=Irei%20comparecer%20ao%20culto!"
  target="_blank">
  Confirmar Presença
  </a>

</div>

<script>
function toggleCard(card){
  const img = card.querySelector("img");
  img.classList.toggle("show");
}
</script>

</body>
</html>
